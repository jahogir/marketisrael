<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🛒 Market Israel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#f2f2f2;}
header {background:#ff6600;color:white;padding:15px;text-align:center;font-size:22px;}
.container {padding:15px;}
.card {background:white;padding:10px;margin-bottom:10px;border-radius:10px;}
button {background:#ff6600;color:white;border:none;padding:10px;border-radius:8px;}
input {width:100%;padding:8px;margin:5px 0;}
</style>
</head>

<body>

<header>🛒 Market Israel</header>

<div class="container">

<h3>Добавить объявление</h3>

<input id="title" placeholder="Название">
<input id="price" placeholder="Цена">
<input id="phone" placeholder="Телефон">

<button onclick="addAd()">Добавить</button>

<hr>

<h3>Объявления</h3>
<div id="ads"></div>

</div>

<script>
let ads = JSON.parse(localStorage.getItem("ads") || "[]");

function render() {
  let html = "";
  ads.forEach(ad => {
    html += `
    <div class="card">
      <h3>${ad.title}</h3>
      <p>💰 ${ad.price}</p>
      <button onclick="alert('${ad.phone}')">Показать номер</button>
    </div>
    `;
  });
  document.getElementById("ads").innerHTML = html;
}

function addAd() {
  let title = document.getElementById("title").value;
  let price = document.getElementById("price").value;
  let phone = document.getElementById("phone").value;

  ads.push({title, price, phone});
  localStorage.setItem("ads", JSON.stringify(ads));

  render();
}

render();
</script>

</body>
</html>
